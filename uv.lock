version = 1
revision = 3
requires-python = ">=3.12"

[manifest]
members = [
    "api",
    "etl",
    "kscraper",
    "queue-consumer",
    "scraper",
    "shared",
]

[[package]]
name = "api"
version = "0.1.0"
source = { virtual = "services/api" }

[[package]]
name = "etl"
version = "0.1.0"
source = { virtual = "services/etl" }

[[package]]
name = "kscraper"
version = "0.1.0"
source = { virtual = "." }

[[package]]
name = "queue-consumer"
version = "0.1.0"
source = { virtual = "services/queue-consumer" }

[[package]]
name = "scraper"
version = "0.1.0"
source = { virtual = "services/scraper" }

[[package]]
name = "shared"
version = "0.1.0"
source = { editable = "packages/shared" }
